services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-remtech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-remtech}
      POSTGRES_DB: ${POSTGRES_DB:-remtech}
    ports:
      # Проброс на хост для локальной разработки/тестов (в проде можно убрать).
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-remtech} -d ${POSTGRES_DB:-remtech}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      # production включает гейт обязательных секретов (JWT_SECRET/DATABASE_URL/CORS_ORIGINS).
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-remtech}:${POSTGRES_PASSWORD:-remtech}@postgres:5432/${POSTGRES_DB:-remtech}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
      KB_ASYNC_INGEST: "true"        # ингест БЗ — через Celery-воркер (issue #22)
      ORCHESTRATOR_STATE_BACKEND: redis   # общее состояние диалога (issue #16)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - filesdata:/app/data
    restart: unless-stopped

  # Celery-воркер: фоновый конвейер ингеста базы знаний (issue #22)
  worker:
    build:
      context: ./backend
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-remtech}:${POSTGRES_PASSWORD:-remtech}@postgres:5432/${POSTGRES_DB:-remtech}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - filesdata:/app/data
    restart: unless-stopped

  # Локальный эмбеддер bge-m3 (issue #22 — раньше эмбеддер был недостижим в compose).
  # После первого старта выполнить: docker compose exec ollama ollama pull bge-m3
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv/frontend:ro
      - caddydata:/data
      - caddyconfig:/config
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  filesdata:
  ollamadata:
  caddydata:
  caddyconfig:
