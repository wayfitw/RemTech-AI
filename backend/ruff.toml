line-length = 120
target-version = "py312"
exclude = ["alembic/versions", ".venv"]

[lint]
select = ["E", "F", "W", "I"]
# Стилистику портированного кода (компактные ;, имя l, длинные строки) не трогаем,
# ловим реальные проблемы: неиспользуемые импорты/имена (F), порядок импортов (I).
ignore = ["E402", "E702", "E741", "E501"]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["F401"]
